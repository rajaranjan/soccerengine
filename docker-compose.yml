version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    profiles:
      - prod

  app_dev:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env.dev
    volumes:
      - .:/app
    command:
      [
        "uvicorn",
        "app.main:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    profiles:
      - dev
